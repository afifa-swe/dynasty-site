<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Dynasty - Living Tree</title>
  <link rel="stylesheet" href="/tree/style.css" />
</head>
<body>
  <!-- Фоновый Canvas с анимацией дерева -->
  <canvas id="tree-canvas"></canvas>
  <img id="tree-silhouette-image" src="/tree/tree-silhouette.png" alt="Tree silhouette" style="display:none" />

  <!-- UI: бейдж и контролы -->
  <div class="ui">
    <div class="badge">Dynasty Living Tree</div>
    <div class="controls">
      <button id="reset">Reset View</button>
      <button id="toggle-leaderboard">Leaderboard</button>
    </div>
  </div>

  <!-- Рейтинговая таблица (leaderboard) -->
  <div id="leaderboard-panel" class="leaderboard-panel hidden">
    <div class="leaderboard-header">
      <h2 class="leaderboard-title">Leaderboard</h2>
      <button id="leaderboard-close" class="popup-close">&times;</button>
    </div>
    <div class="leaderboard-search">
      <input id="lb-search" type="text" placeholder="Search by nickname…" autocomplete="off" />
    </div>
    <div class="leaderboard-filters">
      <button class="lb-filter active" data-filter="all">All</button>
      <button class="lb-filter" data-filter="darkness">Darkness</button>
      <button class="lb-filter" data-filter="light">Light</button>
    </div>
    <div id="leaderboard-list" class="leaderboard-list"></div>
  </div>

  <!-- Оверлей с игроками (SVG поверх Canvas) -->
  <div id="players-overlay"></div>

  <!-- Попап профиля игрока -->
  <div id="player-popup" class="popup hidden">
    <button id="popup-close" class="popup-close">&times;</button>
    <div id="popup-content"></div>
  </div>

  <!-- Loading состояние -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading dynasty tree...</p>
  </div>

  <!-- Error состояние -->
  <div id="error-overlay" class="error-overlay hidden">
    <div class="error-content">
      <div class="error-icon">!</div>
      <p class="error-text">Could not load the dynasty tree</p>
      <p class="error-detail" id="error-detail"></p>
      <button id="retry-btn" class="retry-btn">Retry</button>
    </div>
  </div>

  <!-- API config: override for local dev, empty = same origin in production -->
  <script>window.DYNASTY_API_BASE = 'http://127.0.0.1:4000';</script>

  <!-- Фоновая анимация -->
  <script src="/tree/tree2d.js"></script>
  <!-- Логика игроков -->
  <script src="/tree/players.js"></script>
  <!-- Рейтинговая таблица -->
  <script src="/tree/leaderboard.js"></script>
</body>
</html>
